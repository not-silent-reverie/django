{% extends 'mainpage/base.html' %}
{% load static %}

{% block title %}Вход - Apex{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1 class="auth-title">Вход</h1>
        <p class="auth-subtitle">Войдите в свой аккаунт</p>

        <form method="post" class="auth-form" id="loginForm" novalidate>
            {% csrf_token %}
            
            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">Логин</label>
                {{ form.username }}
                <span class="form-error" id="login_username_error"></span>
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">Пароль</label>
                {{ form.password }}
                <span class="form-error" id="login_password_error"></span>
            </div>

            <button type="submit" class="btn-auth">Войти</button>
        </form>

        <p class="auth-link">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </p>
    </div>
</div>

<script src="{% static 'mainpage/js/validation.js' %}"></script>
{% endblock %}
